<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Static Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;0,900;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./styles/style.css" />
  </head>

  <body>
    <h1>Book a Table</h1>

    <form action="#" method="GET" class="contact-form">
      <div class="mb-3">
        <label for="contact-first-name" class="form-label">First Name</label>
        <input
          type="text"
          class="form-control"
          id="contact-first-name"
          name="contact-first-name"
          required
        />
      </div>

      <div class="mb-3">
        <label for="contact-last-name" class="form-label">Last Name</label>
        <input
          type="text"
          class="form-control"
          id="contact-last-name"
          name="contact-last-name"
          required
        />
      </div>

      <div class="mb-3">
        <label for="contact-email" class="form-label">E-mail</label>
        <input
          type="email"
          class="form-control"
          id="contact-email"
          name="contact-email"
          required
        />
      </div>

      <div class="mb-3">
        <label for="message" class="form-label">Message</label>
        <textarea
          class="form-control"
          id="message"
          rows="3"
          name="message"
          required
        ></textarea>
      </div>

      <div class="mb-3 form-check">
        <button type="submit" class="btn btn-secondary" data-bs-dismiss="modal">
          Close
        </button>
        <button type="button" class="btn btn-primary">Submit message</button>
      </div>
    </form>
  </body>
</html>
